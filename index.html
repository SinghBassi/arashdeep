<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arashdeep — Software Developer</title>
  <meta name="description" content="Software crafted with care. Apps and tools built for everyday use.">
  <meta name="theme-color" content="#FF6D00">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💻</text></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --accent: #FF6D00;
      --accent-dark: #E65100;
      --text: #1a1a1a;
      --text-muted: #666;
      --bg: #ffffff;
      --bg-subtle: #fafafa;
      --border: #eaeaea;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 4rem 1.5rem 2rem;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: var(--accent);
      color: white;
      border-radius: 16px;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 2rem;
      box-shadow: 0 4px 12px rgba(255, 109, 0, 0.25);
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      color: var(--text);
    }

    .tagline {
      font-size: 1.15rem;
      color: var(--text-muted);
      max-width: 480px;
    }

    .accent {
      color: var(--accent);
    }

    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.875rem;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    @media (max-width: 480px) {
      .container {
        padding: 2.5rem 1rem 1.5rem;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text: #f0f0f0;
        --text-muted: #999;
        --bg: #111;
        --bg-subtle: #1a1a1a;
        --border: #2a2a2a;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="logo">A</div>

    <h1>Arashdeep</h1>
    <p class="tagline">Software crafted with care &mdash; <span class="accent">apps and tools</span> built for everyday use.</p>

    <footer>
      <span>&copy; <span id="year"></span> Arashdeep. All rights reserved.</span>
      <span>Software Developer</span>
    </footer>
  </main>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
